<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Parent Companion</title>

    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
</head>

<body>

    <header class="top-banner">
        <h1>🌱 Plant Parent Companion</h1>

        <button id="themeToggleBtn">
            Toggle Theme
        </button>
    </header>


        <!-- FORM SECTION -->
        <section class="plant-form-section">

            <form id="plantTrackerForm">

                <input type="text" id="plantNameInput" placeholder="Plant Name" required minlength="2" />

                <select id="sunlightSelect" required>
                    <option value="">Sunlight Need</option>
                    <option value="Low Light">Low Light</option>
                    <option value="Medium Light">Medium Light</option>
                    <option value="Bright Light">Bright Light</option>
                </select>

                <input type="number" id="waterInput" placeholder="Water Every X Days" min="1" max="30" class="waterInput" required />

                <button type="submit">
                    Add Plant
                </button>

            </form>

            <p id="validationMessage"></p>

        </section>

   

</body>

</html>
